<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Zentry Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
    </style>
    <!-- Firebase SDKs (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="../assets/js/firebase-config.js"></script>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- Container -->
    <div class="bg-white rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 flex flex-col w-full max-w-md overflow-hidden min-h-[480px] relative">
        
        <a href="../index.html" class="absolute top-6 left-6 text-gray-400 hover:text-gray-600 z-10">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </a>

        <!-- Standard Sign Up -->
        <div class="w-full p-10 md:p-12 flex flex-col justify-center bg-white mt-4">
            <h2 class="text-xl font-bold text-gray-900 mb-1">Create an account</h2>
            <p class="text-[13px] text-gray-500 mb-6">or <a href="signin.html" class="text-blue-600 hover:text-blue-700 hover:underline font-semibold">sign in to your account</a></p>
            
            <form action="#" method="POST" id="signup-form" class="space-y-4">
                <div>
                    <input type="text" id="fullname" placeholder="Full Name" class="w-full border border-gray-200 rounded-lg py-2.5 px-4 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" required>
                </div>
                <div>
                    <input type="email" id="email" placeholder="Email id" class="w-full border border-gray-200 rounded-lg py-2.5 px-4 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" required>
                </div>
                <!-- Password with Eye Icon -->
                <div class="relative">
                    <input type="password" id="password" placeholder="Password" class="w-full border border-gray-200 rounded-lg py-2.5 pl-4 pr-10 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" required>
                    <button type="button" onclick="togglePassword('password', 'eye-icon-1')" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 focus:outline-none">
                        <svg id="eye-icon-1" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                        </svg>
                    </button>
                </div>
                <!-- Confirm Password with Eye Icon -->
                <div class="relative">
                    <input type="password" id="confirm_password" placeholder="Confirm Password" class="w-full border border-gray-200 rounded-lg py-2.5 pl-4 pr-10 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" required>
                    <button type="button" onclick="togglePassword('confirm_password', 'eye-icon-2')" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 focus:outline-none">
                        <svg id="eye-icon-2" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                        </svg>
                    </button>
                </div>
                
                <button type="submit" class="w-full bg-[#2563eb] text-white font-semibold rounded-lg py-2.5 text-sm hover:bg-blue-700 transition-colors shadow-sm mt-3">
                    Sign up
                </button>
            </form>
        </div>
        
    </div>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
            }
        }

        function showToast(message, isError = false) {
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.className = 'fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg transform transition-all duration-300 translate-y-[-150%] opacity-0 z-50 flex items-center gap-3 text-white';
                toast.innerHTML = `
                    <div id="toast-icon"></div>
                    <span id="toast-message" class="font-medium text-sm"></span>
                `;
                document.body.appendChild(toast);
            }
            
            toast.className = `fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg transform transition-all duration-300 translate-y-[-150%] opacity-0 z-50 flex items-center gap-3 text-white ${isError ? 'bg-red-500' : 'bg-green-500'}`;
            document.getElementById('toast-icon').innerHTML = isError 
                ? '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>'
                : '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>';
            
            document.getElementById('toast-message').textContent = message;
            
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-[-150%]', 'opacity-0');
                toast.classList.add('translate-y-0', 'opacity-100');
            });

            setTimeout(() => {
                toast.classList.add('translate-y-[-150%]', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 4000);
        }

        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const conf = document.getElementById('confirm_password').value;
            const btn = this.querySelector('button[type="submit"]');

            if (pass !== conf) {
                showToast("Passwords do not match!", true);
                return;
            }
            
            btn.innerText = 'Creating Account...';
            btn.disabled = true;
            
            auth.createUserWithEmailAndPassword(email, pass)
                .then((userCredential) => {
                    const user = userCredential.user;
                    // Store extra data in Firestore
                    return db.collection('users').doc(user.uid).set({
                        fullname: document.getElementById('fullname').value,
                        email: email,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                })
                .then(() => {
                    const user = firebase.auth().currentUser;
                    return user.sendEmailVerification();
                })
                .then(() => {
                    showToast('Welcome! A verification email has been sent to your Gmail.');
                    localStorage.setItem('signedIn', 'true');
                    setTimeout(() => { globalThis.location.href = 'dashboard.html'; }, 2000);
                })
                .catch((error) => {
                    showToast(handleFirebaseError(error), true);
                    btn.innerText = 'Sign up';
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
