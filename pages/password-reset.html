<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset - Zentry Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
    </style>
    <!-- Firebase SDKs (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="../assets/js/firebase-config.js"></script>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- Container -->
    <div class="bg-white rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 flex flex-col w-full max-w-md min-h-[420px] relative p-10 md:p-12">
        
        <a href="signin.html" class="absolute top-6 left-6 text-gray-400 hover:text-gray-600 z-10 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
        </a>

        <div class="flex-1 flex flex-col justify-center">
            
            <!-- Send Reset Link -->
            <div id="request-section" class="block animate-[fadeIn_0.3s_ease-out]">
                <h2 class="text-xl font-bold text-gray-900 mb-1">Reset Password</h2>
                <p class="text-[13px] text-gray-500 mb-6">Enter your email address. Zentry Vault will send a secure reset link directly to your Gmail.</p>
                
                <form onsubmit="sendResetLink(event)" class="space-y-4">
                    <div>
                        <input type="email" id="reset-email" placeholder="Email id" class="w-full border border-gray-200 rounded-lg py-2.5 px-4 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" required>
                    </div>
                    
                    <button type="submit" id="submit-btn" class="w-full bg-[#2563eb] text-white font-semibold rounded-lg py-2.5 text-sm hover:bg-blue-700 transition-colors shadow-sm mt-3 flex justify-center items-center">
                        Send Reset Link
                    </button>
                    <div class="text-center pt-3">
                        <a href="signin.html" class="text-[13px] text-gray-500 hover:text-gray-700 hover:underline font-medium">Back to Sign in</a>
                    </div>
                </form>
            </div>

            <!-- Success Section -->
            <div id="success-section" class="hidden text-center animate-[fadeIn_0.4s_ease-out]">
                <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                </div>
                <h2 class="text-xl font-bold text-gray-900 mb-2">Email Sent Successfully</h2>
                <p class="text-[13px] text-gray-500 mb-6">A secure password reset link has been sent to your Gmail. Please check your inbox and follow the instructions.</p>
                <a href="signin.html" class="inline-block w-full bg-[#2563eb] text-white font-semibold rounded-lg py-2.5 text-sm hover:bg-blue-700 transition-colors shadow-sm mt-2">
                    Back to Sign In
                </a>
            </div>

        </div>
        
    </div>

    <!-- Custom Notification Box -->
    <div id="notification-box" class="fixed top-8 right-8 z-[200] max-w-xs w-full hidden transform transition-all duration-300 translate-x-10 opacity-0">
        <div class="bg-white border-l-4 border-emerald-500 shadow-2xl rounded-r-lg p-4 flex items-start gap-3">
            <div id="notification-icon" class="mt-0.5 text-emerald-500">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <div class="flex-1">
                <p id="notification-msg" class="text-sm font-medium text-gray-800 leading-snug"></p>
            </div>
            <button onclick="closeNotification()" class="text-gray-400 hover:text-gray-600 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
    </div>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <script>
        function showNotification(msg, type = 'info') {
            const box = document.getElementById('notification-box');
            const msgEl = document.getElementById('notification-msg');
            const iconEl = document.getElementById('notification-icon');
            msgEl.innerText = msg;
            
            box.querySelector('div').className = `bg-white border-l-4 shadow-2xl rounded-r-lg p-4 flex items-start gap-3 ${type === 'error' ? 'border-red-500' : 'border-emerald-500'}`;
            iconEl.className = `mt-0.5 ${type === 'error' ? 'text-red-500' : 'text-emerald-500'}`;
            
            box.classList.remove('hidden');
            setTimeout(() => {
                box.classList.remove('translate-x-10', 'opacity-0');
                box.classList.add('translate-x-0', 'opacity-100');
            }, 10);
            
            if (globalThis.notifTimeout) clearTimeout(globalThis.notifTimeout);
            globalThis.notifTimeout = setTimeout(closeNotification, 4000);
        }

        function closeNotification() {
            const box = document.getElementById('notification-box');
            box.classList.add('translate-x-10', 'opacity-0');
            box.classList.remove('translate-x-0', 'opacity-100');
            setTimeout(() => { box.classList.add('hidden'); }, 300);
        }

        function sendResetLink(event) {
            event.preventDefault();
            const email = document.getElementById('reset-email').value;
            const btn = document.getElementById('submit-btn');
            
            const originalText = btn.innerHTML;
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Sending...`;
            btn.disabled = true;

            // Use Real Firebase Password Reset Email
            auth.sendPasswordResetEmail(email)
                .then(() => {
                    document.getElementById('request-section').classList.add('hidden');
                    document.getElementById('success-section').classList.remove('hidden');
                    showNotification("Passward reset Link sent to your Gmail!", "success");
                })
                .catch((error) => {
                    showNotification(handleFirebaseError(error), "error");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                });
        }
    </script>
</body>
</html>
